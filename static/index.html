<html lang="en">
    <head>
        <meta charset="utf8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>KAIL</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="kail.css" />
    </head>
    <body>
        <div id="app">

          <!-- Sidebar -->
          <aside id="sidebar">
            <div class="sidebar-header">
              <h1>Conversations</h1>
              <button class="btn-new-chat" id="new-chat-btn">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/>
                </svg>
                New chat
              </button>
            </div>

            <div class="sidebar-section-label">Chats</div>
            <div class="chat-list" id="chat-list"></div>

            <div class="sidebar-footer">
              <button class="sidebar-footer-btn" onclick="document.getElementById('json-upload-input').click()" title="Upload a previously downloaded conversation">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M8 11V3M5 6l3-3 3 3"/><rect x="2" y="11" width="12" height="3" rx="1"/>
                </svg>
                Upload conversation
              </button>
              <input type="file" id="json-upload-input" accept=".json,application/json" />
              <button class="sidebar-footer-btn" id="settings-btn">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.22 3.22l1.42 1.42M11.36 11.36l1.42 1.42M3.22 12.78l1.42-1.42M11.36 4.64l1.42-1.42"/>
                </svg>
                Settings
              </button>
            </div>
          </aside>

          <!-- Main -->
          <div id="main">
            <header id="header">
              <button class="btn-icon" id="toggle-sidebar-btn" title="Toggle sidebar">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/>
                </svg>
              </button>
              <span id="header-title"></span>
              <span class="model-badge" id="model-badge">default</span>
              <button class="btn-icon" title="Settings" id="settings-btn2">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.22 3.22l1.42 1.42M11.36 11.36l1.42 1.42M3.22 12.78l1.42-1.42M11.36 4.64l1.42-1.42"/>
                </svg>
              </button>
            </header>

            <div id="messages"></div>

            <div id="input-area">

              <!-- Compose controls: entity selector + manual toggle -->
              <div class="compose-controls">
                <span class="entity-selector-label">Post as</span>
                <div class="entity-selector" id="entity-selector">
                  <button class="entity-pill selected" id="post-as-user-btn" title="Post as User">
                    <span class="pill-dot"></span>User
                  </button>
                  <button class="entity-pill" id="post-as-assistant-btn" title="Post as Assistant">
                    <span class="pill-dot"></span>Assistant
                  </button>
                  <button class="entity-pill" id="post-as-tool-btn" title="Post as Tool">
                    <span class="pill-dot"></span>Tool
                  </button>
                  <button class="entity-pill" id="post-as-system-btn" title="Post as System">
                    <span class="pill-dot"></span>System
                  </button>
                </div>

                <div class="compose-sep"></div>

                <button class="manual-toggle" id="manual-toggle-btn" title="When active, messages are posted without triggering AI completion">
                  <span class="toggle-icon">⊘</span>
                  No AI response
                </button>
              </div>

              <div class="input-shell tint-user" id="input-shell">
                <div class="input-attachments" id="input-attachments"></div>
                <textarea id="message-input" placeholder="Send a message…" rows="1"></textarea>
                <div class="input-toolbar">
                  <button class="btn-attach" onclick="document.getElementById('file-input').click()" title="Attach image">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                      <rect x="1" y="4" width="14" height="10" rx="2"/><circle cx="5.5" cy="8.5" r="1.5"/>
                      <path d="M14 10l-3.5-3.5L7 10l-2-2-4 4"/>
                    </svg>
                  </button>
                  <input type="file" id="file-input" accept="image/*" multiple />
                  <div class="spacer"></div>

                  <!-- Stop button (shown while streaming) -->
                  <button id="stop-btn" title="Stop generation">
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="10" height="10" rx="1" fill="currentColor" stroke="none"/></svg>
                    Stop
                  </button>

                  <!-- Send button -->
                  <button id="send-btn" title="Send (Enter)">
                    <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 8L3 2l2 6-2 6 10-6z"/></svg>
                  </button>
                </div>
              </div>
              <div class="input-hint" id="input-hint">
                Enter to send · Shift+Enter for newline<span class="input-hint-manual-mode" id="input-hint-manual-mode"> · AI completion OFF</span>
              </div>
            </div>

          </div>
        </div>

        <!-- Popout modal - - >
        <div id="popout-overlay" onclick="closePopout(event)">
          <div id="popout-modal">
            <div class="popout-header">
              <span class="popout-title" id="popout-title">REASONING</span>
              <button class="btn-icon" onclick="closePopoutDirect()">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>
              </button>
            </div>
            <div class="popout-body" id="popout-body"></div>
          </div>
        </div>
        -->

        <!-- Lightbox -->
        <div id="lightbox">
          <div id="lightbox-close">✕</div>
          <img id="lightbox-img" src="" alt="">
        </div>

        <!-- Settings modal -->
        <div id="settings-overlay">
          <div id="settings-modal">
            <div class="settings-header">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="var(--text-muted)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.22 3.22l1.42 1.42M11.36 11.36l1.42 1.42M3.22 12.78l1.42-1.42M11.36 4.64l1.42-1.42"/>
              </svg>
              <h2>Settings</h2>
              <button class="btn-icon" id="settings-close-btn">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>
              </button>
            </div>
            <div class="settings-body">
              <div class="settings-section">
                <!--<div class="settings-section-title">Model</div>-->
                <div class="settings-row">
                  <div class="settings-row-info"><div class="settings-row-label">Model</div><div class="settings-row-desc">Select which model to use for responses</div></div>
                  <select class="settings-select" id="model-select"></select>
                </div>
                <!--
                <div class="settings-row">
                  <div class="settings-row-info"><div class="settings-row-label">Temperature</div><div class="settings-row-desc">Controls randomness (0 = deterministic, 1 = creative)</div></div>
                  <input type="range" class="settings-slider" min="0" max="100" value="70">
                </div>
                <div class="settings-row">
                  <div class="settings-row-info"><div class="settings-row-label">Max tokens</div><div class="settings-row-desc">Maximum length of model responses</div></div>
                  <select class="settings-select"><option>1024</option><option selected>4096</option><option>8192</option><option>16384</option></select>
                </div>
              </div>
              <div class="settings-section">
                <div class="settings-section-title">Display</div>
                <div class="settings-row">
                  <div class="settings-row-info"><div class="settings-row-label">Show reasoning by default</div><div class="settings-row-desc">Expand reasoning blocks automatically</div></div>
                  <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
                </div>
                <div class="settings-row">
                  <div class="settings-row-info"><div class="settings-row-label">Show tool use by default</div><div class="settings-row-desc">Expand tool call blocks automatically</div></div>
                  <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
                </div>
                <div class="settings-row">
                  <div class="settings-row-info"><div class="settings-row-label">Show system messages</div><div class="settings-row-desc">Display system-level messages in the conversation</div></div>
                  <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
                </div>
                <div class="settings-row">
                  <div class="settings-row-info"><div class="settings-row-label">Compact mode</div><div class="settings-row-desc">Reduce padding between messages</div></div>
                  <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
                </div>
              </div>
              <div class="settings-section">
                <div class="settings-section-title">Behaviour</div>
                <div class="settings-row">
                  <div class="settings-row-info"><div class="settings-row-label">Stream responses</div><div class="settings-row-desc">Show text as it's generated rather than all at once</div></div>
                  <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
                </div>
                <div class="settings-row">
                  <div class="settings-row-info"><div class="settings-row-label">Auto-scroll</div><div class="settings-row-desc">Scroll to bottom as new content arrives</div></div>
                  <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
                </div>
                <div class="settings-row">
                  <div class="settings-row-info"><div class="settings-row-label">Tool confirmation</div><div class="settings-row-desc">Require approval before executing tool calls</div></div>
                  <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
                </div>
                <div class="settings-row">
                  <div class="settings-row-info"><div class="settings-row-label">System prompt</div><div class="settings-row-desc">Prepend a system message to every conversation</div></div>
                  <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
                </div>
              </div>
              <div class="settings-section">
                <div class="settings-section-title">Storage</div>
                <div class="settings-row">
                  <div class="settings-row-info"><div class="settings-row-label">Save conversation history</div><div class="settings-row-desc">Persist chats locally between sessions</div></div>
                  <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
                </div>
                <div class="settings-row">
                  <div class="settings-row-info"><div class="settings-row-label">Export format</div><div class="settings-row-desc">Default format when exporting a conversation</div></div>
                  <select class="settings-select"><option>JSON</option><option>Markdown</option><option>Plain text</option></select>
                </div>
                -->
              </div>
            </div>
          </div>
        </div>

        <script src="localforage.min.js"></script>
        <script type="module" src="kail.mjs"></script>
        <!--<script type="text/javascript" src="tmp.js"></script>-->
    </body>
</html>
